milestones:
  - when: 10/2022 – 03/2023
    title: Superé el burnout profesional
    description: |
      Tras sufrir un burnout profesional debido al exceso de trabajo sostenido y a la
      falta de límites claros, decidí dar un paso atrás para recuperarme y reflexionar.
      Este período me permitió reconstruir hábitos de trabajo más saludables, priorizar
      la sostenibilidad y reconectar con el tipo de desarrollo de software que aporta
      valor a largo plazo, tanto a los usuarios como a los desarrolladores. Fue un punto
      de inflexión clave en mi forma de entender el trabajo, la colaboración y el
      crecimiento.

  - when: 05/2022
    title: Charla en JSDay Canarias 2022
    youtube: V4sXNlzJIy8
    description: |
      En esta charla compartí cómo optimizamos drásticamente un proceso pesado en
      Node.js, reduciendo su tiempo de ejecución de varias horas a tan solo minutos.
      Expliqué estrategias para gestionar flujos asíncronos y simplificar el código para
      lograr mejoras de rendimiento medibles.

  - when: 11/2019
    title: Organizador y anfitrión – Global Day of Coderetreat
    description: |
      Co-organicé y fui anfitrión de la edición de Gran Canaria del Global Day of
      Coderetreat, un evento de jornada completa centrado en los fundamentos del diseño
      de software. Ofreció un espacio seguro y colaborativo para que los desarrolladores
      practicaran y reflexionaran sobre su oficio.

  - when: 10/2019
    title: Taller para la comunidad React Canarias
    youtube: gkTAlgsr4tg
    description: |
      Impartí un taller práctico para introducir a los desarrolladores frontend en
      estrategias modernas de testing usando Cypress y React Testing Library. La sesión
      se centró en ejemplos prácticos y en fomentar una mentalidad de test-first.

  - when: 11/2018
    title: Charla en JSDay Canarias 2018
    youtube: Joqdb-oZjC8
    description: Una charla introductoria sobre npm y cómo publicar paquetes en él.

  - when: 11/2018
    title: Compilé Node.js en un Chromebook en NodeConf EU
    description: |
      Durante un taller en NodeConf EU compilé Node.js desde cero en un Acer Chromebook
      R11 con Debian virtual. Tardé casi 2 horas solo en compilar.

  - when: 03/2017
    title: Segundo premio en el hackathon Hack for Good
    description: |
      En un hackathon de 36 horas centrado en el bien social, mi equipo y yo desarrollamos
      Aprende con Amidi, una Progressive Web App para ayudar a enseñar y preservar la
      cultura canaria a través de cuestionarios interactivos.

  - when: 03/2016
    title: Primer premio en el hackathon Startup Weekend
    description: |
      Me uní a un equipo de habla inglesa en este hackathon de 54 horas, donde construimos
      BasketUp, una plataforma de análisis de baloncesto usando tres smartphones para el
      seguimiento del balón y la visualización de datos.

