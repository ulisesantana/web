milestones:
  - when: 10/2022 – 03/2023
    title: Overcame professional burnout
    description: |
      After experiencing professional burnout due to sustained overwork and blurred
      boundaries, I decided to take a step back to recover and reflect. This period allowed
      me to rebuild healthier work habits, prioritize sustainability, and reconnect with the
      kind of software development that brings long-term value—both to users and to
      developers. It marked a key turning point in how I approach work, collaboration,
      and growth.

  - when: 05/2022
    title: Talk at JSDay Canarias 2022
    youtube: V4sXNlzJIy8
    description: |
      In this talk, I shared how we drastically optimized a heavy Node.js process, reducing
      its runtime from several hours to just minutes. I discussed strategies for handling
      async workflows and simplifying code to achieve measurable performance gains.

  - when: 11/2019
    title: Organizer & Host – Global Day of Coderetreat
    description: |
      I co-organized and hosted the Gran Canaria edition of the Global Day of Coderetreat,
      a full-day, hands-on event focused on software design fundamentals. It provided a
      safe, collaborative space for developers to practice and reflect on their craft.

  - when: 10/2019
    title: Workshop for React Canarias community
    youtube: gkTAlgsr4tg
    description: |
      I ran a hands-on workshop introducing frontend developers to modern testing strategies
      using Cypress and React Testing Library. The session focused on practical examples and
      encouraging a test-first mindset.

  - when: 11/2018
    title: Talk at JSDay Canarias 2018
    youtube: Joqdb-oZjC8
    description: An introductory talk to npm and how to publish on it.

  - when: 11/2018
    title: Compiled Node.js on a Chromebook at NodeConf EU
    description: |
      During a workshop at NodeConf EU, I compiled Node.js from scratch on an Acer
      Chromebook R11 running virtual Debian. Took almost 2 hours only to compile.

  - when: 03/2017
    title: Second prize at Hack for Good hackathon
    description: |
      In a 36-hour hackathon focused on social good, my team and I developed Aprende con
      Amidi, a Progressive Web App to help teach and preserve Canarian culture through
      interactive quizzes.

  - when: 03/2016
    title: First prize at Startup Weekend hackathon
    description: |
      I joined an English-speaking team during this 54-hour startup hackathon, where we
      built BasketUp, a basketball analytics platform using just three smartphones for ball
      tracking and visualization.

